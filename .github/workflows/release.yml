name: release

on:
  push:
    tags:
      - 'v*'
  # Manual re-trigger for the case where one matrix job (e.g. mipsel-softfloat)
  # failed on the original tag push and we've since pushed the build fix to
  # main but can't force-move the immutable tag (tag protection rule). Run
  # this workflow manually with `version` set to the existing release tag —
  # the build matrix runs against the current main, artifacts are uploaded
  # to the matching release page, and the release-notes step is a no-op
  # (release already exists).
  workflow_dispatch:
    inputs:
      version:
        description: 'Existing release tag to upload to (without the leading v). Example: 1.4.0'
        required: true
        type: string

permissions:
  contents: write
  # `tunnel-docker-build` and `tunnel-docker-manifest` jobs push to
  # ghcr.io/${{ github.repository_owner }}/rahgozar-tunnel-node.
  # `packages: write` is required by docker/login-action when authenticating
  # to GHCR with the workflow's auto-provisioned GITHUB_TOKEN. Granted at
  # the workflow level so the matrix-build job (which doesn't need it) and
  # the release job (which doesn't need it) both still have a single
  # well-scoped permissions block.
  packages: write

# Auto-updater public key, embedded into every release binary at compile
# time via `option_env!("RAHGOZAR_UPDATE_PUBKEY")` (see src/update_apply.rs).
# Read from the repo variable `MINISIGN_PUBLIC_KEY` — the bare base64 line
# from a `minisign -G` .pub file (the one *after* the `untrusted comment`).
#
# This env var is populated only when `MINISIGN_SIGNING_ENABLED == 'true'`.
# Empty/whitespace values are treated as "unset" by `src/update_apply.rs`:
# binaries log a runtime warning + apply updates without a sig check. When
# it IS non-empty, desktop and Android update flows refuse to apply an asset
# that doesn't have a matching `.minisig` next to it on the release page.
#
# To enable signed updates end-to-end:
#   1. Generate a keypair (one-time, offline):
#        rsign generate -p rahgozar-update.pub -s rahgozar-update.key
#   2. `gh variable set MINISIGN_PUBLIC_KEY --body "$(tail -1 rahgozar-update.pub)"`
#   3. `gh secret set MINISIGN_SECRET_KEY < rahgozar-update.key`
#   4. Optional, for passphrased keys:
#        `gh secret set MINISIGN_KEY_PASSWORD --body 'your-passphrase'`
#   5. `gh variable set MINISIGN_SIGNING_ENABLED --body true`
#
# Once those are set, the next tag push produces signed artifacts
# and the freshly-built binaries enforce verification on the next update.
env:
  RAHGOZAR_UPDATE_PUBKEY: ${{ vars.MINISIGN_SIGNING_ENABLED == 'true' && vars.MINISIGN_PUBLIC_KEY || '' }}

# Runner strategy:
#   - Linux + Android + mipsel:       self-hosted (mhrv-hetzner-*, Hetzner
#                                     8-core / 31 GB Ubuntu 24.04 box with
#                                     Rust, Android SDK+NDK, Docker, all
#                                     cross-compile toolchains pre-installed).
#                                     Two runners registered for parallelism.
#   - macOS arm64 + amd64, Windows:   GitHub-hosted (we don't self-host those
#                                     OSes; the free minutes on a public repo
#                                     are plenty for those two platforms).
#
# Why self-hosted: GH-hosted 2-core runners were spending ~13 min cold per
# release; on the Hetzner box a cold linux-amd64 build is 1m9s, and warm
# builds with Swatinem/rust-cache are sub-minute. Keeps the toolchain warm,
# and more importantly keeps target/ warm via the rust-cache action.

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux amd64 (glibc) ────────────────────────────────────────────
          # ubuntu-latest gives us GLIBC 2.39, but the x86_64-unknown-linux-gnu
          # target triple still emits the oldest GLIBC symbol version rustc
          # is willing to emit, so the binary loads on any distro ≥ Ubuntu
          # 22.04 / Debian 12 / Mint 21 / Fedora 36. Users behind tight
          # internet who can't dist-upgrade keep working.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: rahgozar-linux-amd64
          # ── Linux arm64 + armhf (glibc) ───────────────────────────────────
          # Cross-compiled from x86_64 ubuntu-latest via apt-installed
          # gcc-aarch64-linux-gnu / gcc-arm-linux-gnueabihf. Upstream had
          # these pre-installed on its self-hosted runners; we apt-install
          # them per-job (~30 s, cached by rust-cache afterward).
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: rahgozar-linux-arm64
            linux_cross_apt: gcc-aarch64-linux-gnu
            cargo_linker_var: CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER
            cargo_linker_val: aarch64-linux-gnu-gcc
          - target: arm-unknown-linux-gnueabihf
            os: ubuntu-latest
            name: rahgozar-raspbian-armhf
            linux_cross_apt: gcc-arm-linux-gnueabihf
            cargo_linker_var: CARGO_TARGET_ARM_UNKNOWN_LINUX_GNUEABIHF_LINKER
            cargo_linker_val: arm-linux-gnueabihf-gcc
          # ── macOS + Windows ────────────────────────────────────────────────
          # Already github-hosted upstream; works unchanged on the fork.
          - target: x86_64-apple-darwin
            os: macos-latest
            name: rahgozar-macos-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: rahgozar-macos-arm64
          - target: x86_64-pc-windows-gnu
            os: windows-latest
            name: rahgozar-windows-amd64
          # ── Windows arm64 (Snapdragon X / Surface Pro X+11, MSVC) ──────────
          # Native arm64 Windows ships on Copilot+ PCs (2024+). Cross-built
          # from windows-latest's pre-installed MSVC arm64 toolset (VS 2022
          # NativeDesktop workload). `aarch64-pc-windows-msvc` is Rust tier-2
          # with prebuilt std, so `rustup target add` is all the setup it
          # needs — no MinGW dance like the GNU amd64 leg above.
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            name: rahgozar-windows-arm64
          # ── Linux musl (static, OpenWRT / Alpine / libc-less) ─────────────
          # Built via the messense/rust-musl-cross docker images that
          # ship a complete musl toolchain. ubuntu-latest has docker
          # pre-installed; no per-job toolchain setup needed beyond the
          # existing "Build CLI (musl via docker)" steps further down.
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: rahgozar-linux-musl-amd64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: rahgozar-linux-musl-arm64
          # ── OpenWRT armv7 (Cortex-A7/A9 routers, hard-float musl) ──────────
          # Covers a big chunk of mid-2010s+ home routers: ipq40xx, mt7622,
          # ipq806x (Netgear Nighthawk R7800, GL.iNet Brume/Beryl, TP-Link
          # Archer C2600, Linksys WRT3200ACM, etc.). The existing
          # `arm-unknown-linux-gnueabihf` leg is glibc-Raspbian and doesn't
          # run on OpenWRT (musl). Built via the messense armv7-musleabihf
          # image — same docker pattern as the amd64/arm64 musl legs above.
          # tier-2, has prebuilt std, so no `-Z build-std` dance.
          - target: armv7-unknown-linux-musleabihf
            os: ubuntu-latest
            name: rahgozar-openwrt-armv7-musleabihf
          # ── OpenWRT MT7621 (mipsel-softfloat, Rust tier-3) ────────────────
          # Dozens of cheap home routers run this chipset and they
          # *specifically* need the soft-float variant — MT7621 has no
          # hardware FPU and a hard-float binary segfaults on the first
          # fp op. Built inside messense/rust-musl-cross:mipsel-musl with
          # nightly Rust + `-Z build-std` + `-C target-feature=+soft-float`.
          # `continue-on-error: true` so a tier-3 regression doesn't block
          # the rest of the release. Issue #26.
          - target: mipsel-unknown-linux-musl
            os: ubuntu-latest
            name: rahgozar-openwrt-mipsel-softfloat
            mipsel_softfloat: true
          # ── OpenWRT MIPS big-endian (mips-musl soft-float) — DROPPED ───────
          # `mips-unknown-linux-musl` (covers Atheros AR71XX/AR9XXX-era
          # routers: TP-Link Archer C7, WDR4300, Ubiquiti EdgeRouter Lite)
          # is dropped from the matrix as of v2.7.x. The build was added
          # in d2376f4 but never produced a successful artifact — the
          # underlying messense/rust-musl-cross:mips-musl image is broken
          # for `-nostartfiles -nodefaultlibs` linking (which is what
          # rustc emits): gcc forwards `crt1.o` / `crti.o` / `crtbegin.o`
          # to ld as positional relative names, and the bundled ld
          # doesn't search the gcc-internal `-L` paths for positional
          # `.o` arguments. crt1.o exists at
          # /usr/local/musl/mips-unknown-linux-musl/lib/crt1.o but ld
          # refuses to find it. Confirmed reproducible OUTSIDE Rust with
          # a plain C hello-world plus the same gcc flags Rust uses.
          # The mipsel-musl image (kept) doesn't have the bug — Rust's
          # mipsel link path differs subtly upstream. libunwind is also
          # missing from the mips-musl image entirely.
          #
          # Fixes attempted before dropping:
          #   1. Symlinked the missing sysroot dir into place.
          #   2. Bypassed the gcc wrapper with the bare binary name.
          #   3. find-based RUSTFLAGS=-B/-L crt-path injection.
          # None work because the root cause is ld's positional-arg
          # behavior, not a path issue we can paper over from outside.
          # The real fix needs either a new docker image (~weeks) or
          # patching messense/rust-musl-cross upstream.
          #
          # AR71XX hardware is 15+ years old; users on that hardware
          # can build from source on the device or cross-compile with
          # their own toolchain. The maintenance cost of keeping a
          # red X on every release outweighs the audience size.

    runs-on: ${{ matrix.os }}
    # The tier-3 mipsel-softfloat target is best-effort: nightly Rust
    # occasionally regresses it. Letting it fail keeps the main release
    # going so desktop/Android/CLI users aren't blocked by router support.
    # (mips big-endian soft-float was dropped — see the matrix entry
    # above for why.)
    continue-on-error: ${{ matrix.mipsel_softfloat == true }}

    # Drive Mode OAuth: BYO — see docs/drive_oauth_setup.md. There are
    # no compile-time OAuth credentials baked into release binaries;
    # every end-user registers their own Google Cloud OAuth client and
    # pastes the values into the Drive setup screen at runtime. CI does
    # not need to know any client_id / client_secret.

    steps:
      # Heal any root-owned leftovers from a previous mipsel docker
      # build that failed before its post-step chown could run. The
      # docker container writes target/ as root, and if cargo errors
      # inside the container the outer `sudo chown -R` line never
      # executes (bash -e exits on the docker non-zero), leaving root-
      # owned files that fail every subsequent `actions/checkout@v4`
      # workspace clean with `EACCES: permission denied unlink`. This
      # step is a no-op on a clean runner, so cheap to keep always-on.
      # Self-hosted only; GitHub-hosted runners get a fresh VM each run.
      - name: Pre-checkout — clean root-owned files (self-hosted only)
        if: contains(matrix.os, 'self-hosted')
        run: |
          if [ -d "$GITHUB_WORKSPACE/target" ]; then
            sudo rm -rf "$GITHUB_WORKSPACE/target" || true
          fi
          # Stale .rustc_info.json at the workspace root is the
          # specific file `actions/checkout` errors on; nuke any
          # other root-owned scraps that may be sitting there too.
          sudo find "$GITHUB_WORKSPACE" -maxdepth 2 -uid 0 -exec rm -rf {} + 2>/dev/null || true

      - uses: actions/checkout@v4

      # Skip the host-level rustup install for the tier-3 mipsel-softfloat
      # target — that's tier-3 in stable Rust (no prebuilt stdlib via
      # rustup), and the docker image we use ships its own nightly + std.
      # Trying to pass `targets: mipsel-unknown-linux-musl` to
      # dtolnay/rust-toolchain errors out with "error: component
      # 'rust-std' for target 'mipsel-unknown-linux-musl' is unavailable
      # for download", which fails the job before the docker step ever
      # runs.
      #
      # On self-hosted this action is mostly a no-op: rustup is already
      # installed and the standard target triples are pre-added. It
      # still verifies the target is present and is cheap enough to keep
      # as a safety net.
      # All matrix entries use latest stable. If a future target ever
      # needs an older MSRV (e.g. the retired Win7 i686-pc-windows-msvc
      # entry that required 1.77.2), reintroduce a `matrix.rust_toolchain`
      # override and substitute it for the literal `stable` below.
      - uses: dtolnay/rust-toolchain@master
        if: matrix.mipsel_softfloat != true
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      # Cache target/ + cargo registry across runs — this is the big
      # self-hosted speedup. Without it, actions/checkout@v4's default
      # `git clean -ffdx` wipes target/ between runs and every build is
      # cold. With it, warm builds are sub-minute even for the full
      # release profile.
      #
      # cache-bin: false is MANDATORY on our self-hosted runners. With
      # the default (true), rust-cache aggressively prunes $CARGO_HOME/bin
      # of binaries it didn't install via `cargo install`, including the
      # `rustup` binary that cargo/rustc/etc. are symlinked to. The next
      # job then hits "command not found" or a broken-symlink TOML parse
      # error from a stale cargo. We want target/ + registry caching, NOT
      # bin pruning. rustup is pre-installed on the runners anyway.
      - uses: Swatinem/rust-cache@v2
        if: matrix.mipsel_softfloat != true
        with:
          key: ${{ matrix.target }}-stable
          cache-bin: "false"

      # Cross-compile toolchains. Same story as above — gated to hosted
      # runners; self-hosted has gcc-aarch64-linux-gnu + gcc-arm-linux-gnueabihf
      # pre-installed, and the linker entries live in
      # /home/ghrunner/cargo-{01,02}/config.toml (seeded once at runner
      # setup time, picked up via CARGO_HOME env).
      - name: Install aarch64 cross-compile toolchain (Linux only)
        if: matrix.target == 'aarch64-unknown-linux-gnu' && runner.environment == 'github-hosted'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Install armhf cross-compile toolchain (Linux only)
        if: matrix.target == 'arm-unknown-linux-gnueabihf' && runner.environment == 'github-hosted'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf
          echo '[target.arm-unknown-linux-gnueabihf]' >> ~/.cargo/config.toml
          echo 'linker = "arm-linux-gnueabihf-gcc"' >> ~/.cargo/config.toml

      # Cross-compile gcc for the glibc arm64 / armhf targets. apt-installed
      # per-job; rust-cache won't help here (it's a system package) but the
      # install is fast (~20 s for the two .deb downloads). We also export
      # the linker env var here rather than via .cargo/config.toml so the
      # setting is scoped to this job and doesn't bleed into cached state.
      - name: Install Linux cross-compile gcc
        if: matrix.linux_cross_apt != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.linux_cross_apt }}
          echo "${{ matrix.cargo_linker_var }}=${{ matrix.cargo_linker_val }}" >> "$GITHUB_ENV"

      - name: Install Windows MinGW toolchain
        if: matrix.target == 'x86_64-pc-windows-gnu'
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc

      - name: Configure Windows GNU linker
        if: matrix.target == 'x86_64-pc-windows-gnu'
        shell: pwsh
        run: |
          $gcc = "${{ steps.msys2.outputs.msys2-location }}\mingw64\bin\gcc.exe" -replace '\\','/'
          New-Item -ItemType Directory -Force -Path $env:USERPROFILE/.cargo | Out-Null
          Add-Content -Path $env:USERPROFILE/.cargo/config.toml -Value '[target.x86_64-pc-windows-gnu]'
          Add-Content -Path $env:USERPROFILE/.cargo/config.toml -Value "linker = '$gcc'"

      - name: Build CLI
        # Skip ALL musl variants — they each have a dedicated docker step
        # below. `endsWith(…, '-linux-musl')` used to be the gate, but it
        # misses `armv7-unknown-linux-musleabihf`; `contains(…, 'musl')`
        # catches every triple that should go through docker (musl, musleabi,
        # musleabihf) without false positives on glibc/Darwin/Windows.
        if: "!contains(matrix.target, 'musl')"
        run: cargo build --release --target ${{ matrix.target }} --bin rahgozar

      # Fully-static musl builds for OpenWRT / Alpine / libc-less systems.
      # messense/rust-musl-cross ships a pre-built musl toolchain so `ring`
      # (rustls' crypto backend) cross-compiles cleanly on both archs.
      #
      # We also build the `tunnel-node` server bridge in the same docker
      # run `tunnel-node/Cargo.toml` carries an
      # empty `[workspace]` opt-out so it's a standalone crate with its
      # own target/ — built via `--manifest-path tunnel-node/Cargo.toml`.
      # Sharing the docker container saves ~30 s of cold-start per leg.
      - name: Build CLI + tunnel-node + drive-relay (musl via docker)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          docker run --rm -v "$PWD":/src -w /src \
            -e RAHGOZAR_UPDATE_PUBKEY \
            messense/rust-musl-cross:x86_64-musl \
            bash -c '
              set -eux
              cargo build --release --target x86_64-unknown-linux-musl --bin rahgozar
              cargo build --release --target x86_64-unknown-linux-musl \
                -p rahgozar-drive-relay --bin rahgozar-drive-relay
              cargo build --release \
                --manifest-path tunnel-node/Cargo.toml \
                --target x86_64-unknown-linux-musl --bin tunnel-node
            '
          sudo chown -R "$(id -u):$(id -g)" target tunnel-node/target

      - name: Build CLI + tunnel-node + drive-relay (musl via docker, arm64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          docker run --rm -v "$PWD":/src -w /src \
            -e RAHGOZAR_UPDATE_PUBKEY \
            messense/rust-musl-cross:aarch64-musl \
            bash -c '
              set -eux
              cargo build --release --target aarch64-unknown-linux-musl --bin rahgozar
              cargo build --release --target aarch64-unknown-linux-musl \
                -p rahgozar-drive-relay --bin rahgozar-drive-relay
              cargo build --release \
                --manifest-path tunnel-node/Cargo.toml \
                --target aarch64-unknown-linux-musl --bin tunnel-node
            '
          sudo chown -R "$(id -u):$(id -g)" target tunnel-node/target

      # OpenWRT armv7 hard-float (Cortex-A7/A9). tunnel-node is NOT built
      # here — the bridge runs on the *exit* node (a real VPS), not on
      # consumer routers, so it ships only for the amd64/arm64 musl legs.
      #
      # Uses the `set +e` + `trap … EXIT` chown pattern from the mipsel /
      # mips tier-3 legs below: if `docker run` exits non-zero (transient
      # network pull failure, OOM, regression in messense's image, etc.),
      # the post-docker `sudo chown` would otherwise be skipped because
      # bash -e short-circuits on the docker failure. That leaves
      # target/ root-owned and breaks `actions/checkout@v4` on every
      # subsequent self-hosted run with EACCES on target/.rustc_info.json
      # (which is exactly why the "Pre-checkout — clean root-owned
      # files" step at the top of this job exists as a safety net).
      # The trap fires on any exit path and brings ownership back to
      # the runner user; the explicit `exit $rc` propagates the docker
      # exit code as this step's status so the job still fails when it
      # should.
      - name: Build CLI (musl via docker, armv7)
        if: matrix.target == 'armv7-unknown-linux-musleabihf'
        run: |
          set +e
          trap 'sudo chown -R "$(id -u):$(id -g)" target 2>/dev/null || true' EXIT
          docker run --rm -v "$PWD":/src -w /src \
            -e RAHGOZAR_UPDATE_PUBKEY \
            messense/rust-musl-cross:armv7-musleabihf \
            bash -c '
              set -eux
              cargo build --release --target armv7-unknown-linux-musleabihf --bin rahgozar
            '
          rc=$?
          exit $rc

      # OpenWRT MT7621 / mipsel-softfloat. messense doesn't publish a
      # `:mipsel-musl-softfloat` tag — the mipsel-musl image is
      # hardfloat. We build soft-float anyway via
      # `RUSTFLAGS=-C target-feature=+soft-float` + `-Z build-std` so
      # libstd itself is recompiled to emit soft-float code. The
      # gcc/musl shipping in the image is hardfloat but we never link
      # anything more than libc (`ring` is pure asm for the crypto
      # that matters), so musl's lack of softfloat libm doesn't bite.
      # Requires nightly Rust since mipsel is Rust tier 3 in the
      # stable channel — no prebuilt std.
      - name: Build CLI (mipsel-softfloat via docker)
        if: matrix.target == 'mipsel-unknown-linux-musl' && matrix.mipsel_softfloat == true
        # The inner script is single-quoted so the `#` lines stay as
        # real comments. An earlier version of this step used
        # `sh -c "... \` (backslash-continuation inside a
        # double-quoted YAML folded string) which collapsed into one
        # line — the first `#` then commented out everything after it,
        # reducing the whole docker payload to `set -eux;` and failing
        # silently at the post-docker chown. Heredoc-style single
        # quotes preserve newlines verbatim; no comment collapse.
        run: |
          # Always chown back, even if docker exits non-zero. The previous
          # form (`docker run …; sudo chown …`) ran chown only on success
          # because bash -e short-circuits on the docker failure; that
          # left target/ root-owned and broke `actions/checkout@v4` on
          # every subsequent self-hosted run with EACCES on
          # target/.rustc_info.json. The `trap … EXIT` runs the chown
          # whether docker succeeded or failed, so a transient mipsel
          # compile regression never poisons the runner workspace.
          set +e
          trap 'sudo chown -R "$(id -u):$(id -g)" target 2>/dev/null || true' EXIT
          docker run --rm -v "$PWD":/src -w /src \
            -e RUSTFLAGS='-C target-feature=+soft-float' \
            -e RAHGOZAR_UPDATE_PUBKEY \
            messense/rust-musl-cross:mipsel-musl \
            bash -c '
              set -eux
              # The image ships a pre-installed nightly that rustup
              # cannot upgrade in place — `clippy-preview/share/doc/clippy/README.md`
              # is missing from the pre-bake, and rustup errors with
              # "failure removing component clippy-preview". Nuke it
              # first, then install fresh.
              rustup toolchain uninstall nightly 2>/dev/null || true
              rustup toolchain install nightly --profile minimal
              rustup component add rust-src --toolchain nightly
              cargo +nightly build --release \
                -Z build-std=std,panic_abort \
                --target mipsel-unknown-linux-musl \
                --bin rahgozar
            '
          rc=$?
          # `trap … EXIT` will fire the chown on shell exit — the explicit
          # exit here just propagates the docker exit code as the step
          # status (success vs continue-on-error path).
          exit $rc

      # MIPS big-endian soft-float (Atheros AR71XX/AR9XXX routers). Same
      # tier-3 nightly-+-build-std treatment as mipsel-softfloat above.
      # No explicit `+soft-float` RUSTFLAGS — the Rust target spec for
      # `mips-unknown-linux-musl` already pins `features: "+soft-float"`,
      # so the emitted code is soft-float regardless. Same root-owned-
      # workspace healing via trap as the mipsel leg.
      #
      # NB: the egui-based `rahgozar-ui` build was retired in v2.4 — the
      # desktop UI moved to Tauri (see the `desktop-build` job below).
      # CLI-only archives are now what this matrix produces; Tauri
      # installers (Win .msi, macOS .dmg, Linux AppImage) come from
      # the separate job and land on the same release page.

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/rahgozar dist/rahgozar
          chmod +x dist/rahgozar
          # OpenWRT / musl archives get the procd init script so routers
          # can start the headless CLI under procd. Everything else just
          # ships the CLI binary — the previous run.sh / run.bat / .command
          # launchers existed to spawn the egui UI alongside, which is
          # gone in v2.4 (replaced by the Tauri installer from the
          # `desktop` job).
          # Pattern covers `-linux-musl` (amd64/arm64/mipsel/mips) plus the
          # armv7 `-linux-musleabihf` variant.
          case "${{ matrix.target }}" in
            *-linux-musl|*-linux-musleabihf)
              cp assets/openwrt/rahgozar.init dist/rahgozar.init
              chmod +x dist/rahgozar.init
              ;;
          esac
          # tunnel-node static binary, amd64/arm64 musl only — the
          # bridge runs on the *exit* node (a real VPS), not on
          # OpenWRT routers, so we skip the mipsel-softfloat leg.
          case "${{ matrix.target }}" in
            x86_64-unknown-linux-musl|aarch64-unknown-linux-musl)
              cp tunnel-node/target/${{ matrix.target }}/release/tunnel-node dist/tunnel-node
              chmod +x dist/tunnel-node
              # rahgozar-drive-relay static binary — same scope as
              # tunnel-node (runs on a VPS, not routers).
              cp target/${{ matrix.target }}/release/rahgozar-drive-relay \
                 dist/rahgozar-drive-relay
              chmod +x dist/rahgozar-drive-relay
              ;;
          esac

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/${{ matrix.target }}/release/rahgozar.exe dist/rahgozar.exe

      - name: Make archive
        shell: bash
        run: |
          cd dist
          case "${{ matrix.target }}" in
            *-pc-windows-*)
              7z a -tzip "${{ matrix.name }}.zip" rahgozar.exe
              ;;
            *-linux-musl|*-linux-musleabihf)
              tar czf "${{ matrix.name }}.tar.gz" rahgozar rahgozar.init
              ;;
            *)
              tar czf "${{ matrix.name }}.tar.gz" rahgozar
              ;;
          esac
          # Separate tarball for tunnel-node so users who just want the
          # exit-node bridge don't have to download the desktop CLI too.
          # The `sign` job globs `dist/*.tar.gz` so these archives get
          # signed automatically alongside the CLI ones.
          #
          # Same shape for `rahgozar-drive-relay` (VPS-side relay for
          # Drive Mode) — we ship the bare binary plus a tarball
          # containing the binary. The install script + systemd unit
          # are fetched separately from the repository so the
          # `curl -fsSLo /tmp/rahgozar-drive-relay-linux-${ARCH}` step in
          # docs/drive_mode.md works against the release page. Both
          # forms are signed by the sign job below.
          case "${{ matrix.target }}" in
            x86_64-unknown-linux-musl)
              tar czf "rahgozar-tunnel-node-linux-musl-amd64.tar.gz" tunnel-node
              cp rahgozar-drive-relay rahgozar-drive-relay-linux-x86_64
              tar czf "rahgozar-drive-relay-linux-musl-amd64.tar.gz" rahgozar-drive-relay
              ;;
            aarch64-unknown-linux-musl)
              tar czf "rahgozar-tunnel-node-linux-musl-arm64.tar.gz" tunnel-node
              cp rahgozar-drive-relay rahgozar-drive-relay-linux-aarch64
              tar czf "rahgozar-drive-relay-linux-musl-arm64.tar.gz" rahgozar-drive-relay
              ;;
          esac

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            dist/${{ matrix.name }}.tar.gz
            dist/${{ matrix.name }}.zip
            dist/rahgozar-tunnel-node-linux-musl-*.tar.gz
            dist/rahgozar-drive-relay-linux-musl-*.tar.gz
            dist/rahgozar-drive-relay-linux-x86_64
            dist/rahgozar-drive-relay-linux-aarch64
          if-no-files-found: ignore

  # Desktop UI (Tauri) build — replaces the egui `rahgozar-ui` binary
  # that used to live under the matrix above. One job per supported
  # desktop OS; each emits the platform-native installer (.msi on
  # Windows, .dmg on macOS, .deb + .AppImage on Linux) and uploads
  # them as artifacts that the `release` job later attaches to the
  # release page.
  #
  # NB: code-signing certificates are NOT plumbed in yet. The Tauri
  # bundler will produce unsigned installers — Windows users will see
  # the SmartScreen warning, macOS users will need to right-click →
  # Open to bypass Gatekeeper on first launch. To enable signing,
  # populate the relevant secrets per
  # https://v2.tauri.app/distribute/sign/ and uncomment the env
  # blocks in the bundle step.
  desktop:
    strategy:
      fail-fast: false
      # Bundle paths anchor at the workspace-root `target/`, NOT
      # `desktop/src-tauri/target/`. The Cargo workspace at the repo root
      # declares `desktop/src-tauri` as a member, so cargo (and `tauri
      # build` underneath) emits into the SHARED workspace target dir.
      matrix:
        include:
          - os: ubuntu-latest
            name: rahgozar-desktop-linux-amd64
            artifact_paths: |
              target/release/bundle/deb/*.deb
              target/release/bundle/rpm/*.rpm
              target/release/bundle/appimage/*.AppImage
          - os: macos-latest
            name: rahgozar-desktop-macos
            artifact_paths: |
              target/release/bundle/dmg/*.dmg
              target/release/bundle/macos/*.app.tar.gz
          - os: windows-latest
            name: rahgozar-desktop-windows-amd64
            # `target/release/bundle/portable/` is staged after `tauri build`
            # by the "Stage Windows portable exe" step below — it lifts the
            # unpackaged Tauri binary (`target/release/rahgozar-desktop.exe`)
            # under a friendly name so users who don't want to run the MSI
            # installer can just double-click the .exe. Relies on WebView2
            # being present, which is the case on Windows 10 20H1+ (May 2020)
            # and every Win11.
            #
            # Why `target/release/bundle/portable/` and not just `portable/`:
            # actions/upload-artifact@v4 strips the longest-common-parent
            # directory of all matched files. Keeping the staging path under
            # the same `target/release/bundle/` root as the MSI/NSIS lets
            # the action strip `target/release/bundle/` uniformly, so the
            # downloaded layout stays `dist/{msi,nsis,portable}/...` and the
            # sign / release / commit-releases steps see a consistent shape.
            artifact_paths: |
              target/release/bundle/msi/*.msi
              target/release/bundle/nsis/*.exe
              target/release/bundle/portable/*.exe
    runs-on: ${{ matrix.os }}

    # Drive Mode OAuth is BYO at runtime (see docs/drive_oauth_setup.md)
    # — no compile-time credentials to thread into the Tauri build.

    steps:
      - uses: actions/checkout@v4

      # Tauri 2 system deps on Linux — Webkit2GTK 4.1 for the embedded
      # webview, plus the same X11 / GL deps a typical GUI app needs.
      - name: Install Linux Tauri system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          # The Cargo workspace at the repo root owns the target dir
          # (see Cargo.toml `members = ["desktop/src-tauri"]`). Cache
          # the workspace-root `target/`. Separate cache key from the
          # CLI matrix so the two don't share / clobber.
          workspaces: . -> target
          key: tauri-${{ runner.os }}

      - name: Install frontend deps
        working-directory: desktop
        run: npm ci

      # Regenerate the platform icon set from `src-tauri/icons/icon.svg`
      # before bundling. The committed tree contains ONLY the SVG (all
      # the derived .png/.ico/.icns/Square*/iOS/Android files are
      # `.gitignore`d so the repo doesn't drift between source and
      # generated artifacts). tauri.conf.json references the generated
      # ICO + PNG paths, so without this step `tauri build` fails on a
      # clean checkout with "icons/icon.ico not found".
      - name: Regenerate icons from SVG
        working-directory: desktop
        run: npm run icons

      - name: Build Tauri bundle
        working-directory: desktop
        run: npm run tauri build
        env:
          CI: true
          # ── Tauri updater signing ─────────────────────────────────
          # `tauri-plugin-updater` uses its own ed25519 signing scheme
          # (NOT the minisign key in `MINISIGN_*` — those are separate
          # signatures attached to the CLI / APK artifacts by the
          # `sign` job further down). Tauri's CLI reads these two env
          # vars during `tauri build`, signs each updater-eligible
          # artifact (.msi, .app.tar.gz, .AppImage), and writes a
          # matching `.sig` file next to it. The frontend's
          # `tauri-plugin-updater` then verifies that `.sig` against
          # the public key baked into `tauri.conf.json` before
          # applying an update.
          #
          # One-time setup:
          #   1. Generate the keypair locally (do NOT commit the
          #      private key):
          #        cd desktop
          #        npx @tauri-apps/cli signer generate
          #        # Save the printed public key into
          #        # `desktop/src-tauri/tauri.conf.json::plugins.updater.pubkey`
          #        # and commit that. Save the private key file aside
          #        # — you'll paste its contents into the secret below.
          #   2. Push the secrets to GitHub:
          #        gh secret set TAURI_SIGNING_PRIVATE_KEY < /path/to/tauri.key
          #        # If you set a passphrase during generate:
          #        gh secret set TAURI_SIGNING_PRIVATE_KEY_PASSWORD --body 'your-passphrase'
          #
          # The bundle step gracefully no-ops on signing when these
          # are unset (the artifact builds, just without a `.sig` —
          # the updater plugin then refuses to apply it, which is the
          # right failure mode while the key is still being staged).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # Portable Windows .exe. `tauri build` always emits an unpackaged
      # binary at `target/release/rahgozar-desktop.exe` alongside the MSI /
      # NSIS bundles — that's the artifact MSI installs into Program Files.
      # We lift it under a friendly name so users who don't want an installer
      # can just double-click the .exe. Implications:
      #   - Needs WebView2 on the host. Windows 10 20H1+ (May 2020) and all
      #     Windows 11 ship it; older Win10 users get a clear error and can
      #     install Edge WebView2 Runtime separately.
      #   - Not in `latest.json` — Tauri's auto-updater only resolves MSI
      #     for Windows. Portable users update by visiting the GitHub
      #     release page (the in-app updater detects portable via the
      #     `is_portable_install` IPC command and routes accordingly —
      #     see desktop/src/lib/updater.svelte.ts).
      #   - IS minisign-signed by the `sign` job below — the loop globs
      #     `dist/portable/rahgozar-portable-*.exe` alongside the CLI /
      #     APK archives, and a post-loop assertion fails the job if any
      #     staged portable .exe didn't get a matching `.minisig`. The
      #     Tauri bundle sig (`.sig`) that ships with .msi / .app.tar.gz /
      #     .AppImage is for in-app auto-updates; the minisign `.minisig`
      #     here is for manual verification by anyone downloading the
      #     portable directly from the release page.
      - name: Stage Windows portable exe
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Sibling of msi/ and nsis/ under target/release/bundle/, so
          # upload-artifact strips the same `target/release/bundle/` prefix
          # for all three groups and downstream jobs see `dist/portable/...`
          # in the same shape as `dist/msi/...` / `dist/nsis/...`.
          $portableDir = "target/release/bundle/portable"
          New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
          Copy-Item target/release/rahgozar-desktop.exe `
            "$portableDir/rahgozar-portable-windows-amd64.exe"
          Get-ChildItem $portableDir

      # Updater artifacts: with `bundle.createUpdaterArtifacts: true`
      # in tauri.conf.json, the bundler emits `.sig` files next to
      # each installer. We collect both here so the release manifest
      # generator (next job) has signatures to reference.
      - name: List bundle output
        if: always()
        shell: bash
        run: |
          set +e
          # `-print` instead of GNU's `-printf '%p\n'` — macOS runners
          # ship BSD find, which doesn't understand -printf. The output
          # is identical for the simple "%p\n" format.
          find target/release/bundle -maxdepth 3 -type f \
            \( -name '*.msi' -o -name '*.dmg' -o -name '*.AppImage' \
               -o -name '*.deb' -o -name '*.rpm' -o -name '*.exe' \
               -o -name '*.tar.gz' -o -name '*.sig' \) \
            -print | sort

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.artifact_paths }}
            target/release/bundle/**/*.sig
          if-no-files-found: error

  # Generate `latest.json` — the manifest that `tauri-plugin-updater`
  # fetches at runtime to decide whether to offer an update. Format
  # documented at https://v2.tauri.app/plugin/updater/#manifest .
  #
  # Runs after all three `desktop` matrix jobs finish so we have
  # Windows + macOS + Linux installers + their `.sig` files in one
  # place. Walks the downloaded artifacts, builds one platform entry
  # per (target, signature) pair, and uploads the resulting JSON as
  # `manifest` — picked up + attached to the GitHub Release page by
  # the `release` job. Tauri's updater plugin points at
  # `releases/latest/download/latest.json` which GitHub redirects to
  # the freshly-tagged release's asset by name, so the next launch
  # of an old client sees the new manifest and can pull v(n+1).
  desktop-manifest:
    needs: [desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          # Same path the other jobs use — tag push gives us the
          # version via `github.ref_name` (with the leading `v`);
          # workflow_dispatch uses `inputs.version` (bare).
          VER="${{ inputs.version || github.ref_name }}"
          VER="${VER#v}"
          echo "version=${VER}" >> "$GITHUB_OUTPUT"

      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: rahgozar-desktop-*
          merge-multiple: true

      - name: List downloaded
        run: ls -la dist/ || true

      - name: Build latest.json
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          # Owner/repo path for the GitHub Release download URLs the
          # manifest references. Hard-coded rather than read from
          # `github.repository` so a manifest baked on a fork still
          # points back at the canonical release page.
          REPO_PATH: dazzling-no-more/rahgozar
        run: |
          set -euo pipefail
          mkdir -p out
          python3 - <<'PY'
          import json, os, re, base64, pathlib

          version = os.environ["VERSION"]
          repo = os.environ["REPO_PATH"]
          dist = pathlib.Path("dist")

          # Tauri's updater consumes a fixed set of `target` keys.
          # Match each downloaded artifact's filename against the
          # pattern its platform produces; pair each one with the
          # accompanying `.sig` so the plugin can verify before apply.
          # Patterns are intentionally loose (suffix match) so a
          # version bump or naming tweak doesn't silently drop a
          # platform from the manifest — the manifest test below
          # would still catch a missed pair.
          PLATFORM_MATCHERS = [
              # (Tauri target key, suffix the installer file ends with)
              ("windows-x86_64", ".msi"),
              ("darwin-x86_64", "x64.app.tar.gz"),
              ("darwin-aarch64", "aarch64.app.tar.gz"),
              ("darwin-universal", ".app.tar.gz"),  # fallback if not split
              ("linux-x86_64", ".AppImage"),
          ]

          # Collect signatures first — every Tauri-signed artifact gets
          # a `.sig` next to it, content is the base64 ed25519 sig the
          # plugin expects.
          sig_for = {}
          for sig in dist.rglob("*.sig"):
              sig_for[sig.stem] = sig.read_text().strip()

          platforms = {}
          for key, suffix in PLATFORM_MATCHERS:
              # Pick the FIRST match per platform (sorted for stability
              # across CI re-runs). If both `darwin-universal` and a
              # split mac artifact exist, the split wins because it's
              # checked first in the list above.
              matches = sorted(p for p in dist.rglob(f"*{suffix}"))
              if not matches:
                  continue
              # Skip if we already filled this key via a more-specific
              # match earlier in PLATFORM_MATCHERS.
              if key in platforms:
                  continue
              installer = matches[0]
              sig = sig_for.get(installer.name)
              if not sig:
                  # No signature → don't ship the entry. Better to omit
                  # the platform than to ship an entry the updater
                  # plugin will then refuse to apply.
                  print(f"WARN: no .sig for {installer.name}, skipping {key}")
                  continue
              # URL points at the release asset. The Tauri updater
              # follows redirects, so `releases/download/v{ver}/...`
              # works even if GitHub serves a CDN URL.
              url = (
                  f"https://github.com/{repo}/releases/download/v{version}/"
                  + installer.name
              )
              platforms[key] = {"signature": sig, "url": url}

          manifest = {
              "version": version,
              "notes": f"See https://github.com/{repo}/releases/tag/v{version}",
              "pub_date": os.environ.get("PUB_DATE", ""),
              "platforms": platforms,
          }
          # `pub_date` is optional in the spec but the plugin logs a
          # warning if it's missing — leave it empty rather than
          # synthesising a fake timestamp.
          out = pathlib.Path("out/latest.json")
          out.write_text(json.dumps(manifest, indent=2))
          print(f"wrote {out}")
          print(json.dumps(manifest, indent=2))
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: rahgozar-desktop-manifest
          path: out/latest.json
          if-no-files-found: error

  # Android build — separate job so it doesn't inflate the matrix. The
  # Rust side here cross-compiles to FOUR ABIs (arm64-v8a, armeabi-v7a,
  # x86_64, x86) via cargo-ndk and drops the .so files into the Gradle
  # project's jniLibs/ tree, which then packages them into a single
  # universal APK. Users pick it once, no per-ABI split.
  #
  # Runs on github-hosted ubuntu-latest. Upstream's self-hosted runner had
  # Android SDK + NDK r26c + cargo-ndk pre-installed at /opt/android-sdk;
  # on github-hosted we set those up per-run. Adds ~3–4 min of cold setup
  # vs the self-hosted instant-start, but doesn't need fork infrastructure.
  android:
    runs-on: ubuntu-latest

    # Drive Mode OAuth is BYO at runtime (see docs/drive_oauth_setup.md)
    # — no compile-time credentials to thread into the Android build.

    steps:
      - uses: actions/checkout@v4

      # JDK 17 for the Android Gradle Plugin + Kotlin compiler. The
      # ubuntu-latest image already ships several JDKs but we pin to 17
      # to match what android/app/build.gradle.kts targets.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Android SDK + NDK r26c. setup-android exports ANDROID_HOME +
      # ANDROID_SDK_ROOT + ANDROID_NDK_HOME so Gradle and cargo-ndk find
      # the toolchain without us hardcoding /opt/android-sdk paths.
      - uses: android-actions/setup-android@v3
        with:
          packages: "ndk;26.2.11394342 platforms;android-34 build-tools;34.0.0"

      # Rust toolchain with all four Android targets cargo-ndk needs.
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      # Cache cargo + target/ FIRST, so the cargo-ndk install below can hit
      # a warm $CARGO_HOME/bin instead of rebuilding. Four cargo-ndk release
      # builds back-to-back with LTO is where the cold cost comes from;
      # rust-cache brings warm runs down to ~3–4 min from ~9 min cold.
      #
      # cache-bin: true (the default) so $CARGO_HOME/bin/cargo-ndk lives in
      # the cache. Upstream's comment about needing cache-bin: false applied
      # to their self-hosted runner where rustup itself lived under
      # $CARGO_HOME/bin and would get pruned — on GitHub-hosted runners
      # rustup is under /usr/share/rustup, so bin-pruning is harmless.
      - uses: Swatinem/rust-cache@v2
        with:
          key: android-universal
          # cargo-ndk writes into `target/<android-triple>/release/`, all
          # four of which we want to cache.
          workspaces: |
            . -> target

      # cargo-ndk: glue between cargo and the NDK's clang. taiki-e's
      # install-action downloads a precompiled binary from the project's
      # releases instead of `cargo install` compiling from source — drops
      # this step from ~1 min cold to <10 s. On cache hit from rust-cache
      # above, the binary is already in $CARGO_HOME/bin and install-action
      # is a no-op.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-ndk

      # Unit tests intentionally avoid the cargo/JNI chain for speed.
      # Keep a cheap Android-target Rust check in CI so cfg(android)
      # exports in src/android_jni.rs compile before Gradle packaging.
      - name: Check Android Rust JNI compile
        run: cargo ndk -t arm64-v8a check -p rahgozar --lib

      # Cache Gradle's downloaded distribution + dependency JARs. Gradle
      # itself doesn't ship with the runner image, so a cold run downloads
      # ~50 MB of Gradle + ~200 MB of Android Gradle Plugin transitive
      # deps from Maven Central / Google Maven — ~1-2 min per release.
      # Key the cache on the gradle wrapper version + any gradle script
      # changes; on hit, ~/.gradle/caches/modules-2 is restored verbatim
      # and Gradle resolves dependencies from disk in seconds.
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # `./gradlew :app:assembleRelease` triggers cargoBuildRelease first
      # which invokes cargo-ndk with all four targets, then Gradle packages
      # the APK (release buildType signed with the committed release.jks —
      # see android/app/build.gradle.kts comment explaining why).
      - name: Build release APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Rename APKs with version
        working-directory: android
        run: |
          VER="${{ inputs.version || github.ref_name }}"
          VER="${VER#v}"
          mkdir -p ../dist

          # With splits.abi enabled in build.gradle.kts (issue #136), AGP
          # emits:
          #   app-universal-release.apk       — all 4 ABIs bundled (~50 MB)
          #   app-arm64-v8a-release.apk       — modern 64-bit ARM (~15 MB)
          #   app-armeabi-v7a-release.apk     — older 32-bit ARM
          #   app-x86_64-release.apk          — emulator on Intel Macs / Chromebook
          #   app-x86-release.apk             — legacy 32-bit Intel emulator
          #
          # We publish all of them so users behind narrow / flaky
          # censorship tunnels can grab the per-ABI APK that matches
          # their device (~15 MB) instead of the ~50 MB universal.
          # Universal stays named `rahgozar-android-universal-v*.apk` so
          # existing download links and Telegram mirrors keep working.
          declare -A ABI_TO_OUTNAME=(
            ["universal"]="rahgozar-android-universal-v${VER}.apk"
            ["arm64-v8a"]="rahgozar-android-arm64-v8a-v${VER}.apk"
            ["armeabi-v7a"]="rahgozar-android-armeabi-v7a-v${VER}.apk"
            ["x86_64"]="rahgozar-android-x86_64-v${VER}.apk"
            ["x86"]="rahgozar-android-x86-v${VER}.apk"
          )

          missing=0
          for abi in "${!ABI_TO_OUTNAME[@]}"; do
            SRC="app/build/outputs/apk/release/app-${abi}-release.apk"
            if [ -f "$SRC" ]; then
              cp "$SRC" "../dist/${ABI_TO_OUTNAME[$abi]}"
              ls -la "../dist/${ABI_TO_OUTNAME[$abi]}"
            else
              echo "::warning::missing expected APK: $SRC"
              missing=$((missing + 1))
            fi
          done

          # Require at least the universal — if that's missing something
          # is genuinely broken and we should fail loud rather than ship
          # a partial release.
          if [ ! -f "../dist/rahgozar-android-universal-v${VER}.apk" ]; then
            echo "::error::universal APK missing; actual outputs:"
            find app/build/outputs/apk -type f -name '*.apk' -print
            exit 1
          fi
          if [ "$missing" -gt 0 ]; then
            echo "::warning::$missing per-ABI APK(s) missing; continuing with universal + whatever built"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: rahgozar-android-universal
          path: dist/*.apk
          if-no-files-found: error

  # Sign every release artifact with minisign — see src/update_apply.rs
  # for the threat model. Produces `<asset>.minisig` files alongside the
  # build artifacts so the auto-updater can verify provenance before
  # swapping the running binary.
  #
  # Gracefully no-ops when `vars.MINISIGN_SIGNING_ENABLED != 'true'` so
  # the workflow keeps shipping releases until the maintainer sets up
  # the keypair (see workflow-level `env` block at the top for the
  # one-time setup commands).
  #
  # Tool: rsign2 (Frank Denis, Rust port of minisign). Produces signatures
  # binary-compatible with the OG `minisign` and verifiable by the
  # `minisign-verify` crate the updater uses. Picked over apt-installing
  # `minisign` because rsign2 cross-installs the same way on every runner
  # we have (Linux self-hosted, Linux GH-hosted) via `cargo install`.
  sign:
    # `desktop` is in `needs:` purely for ORDERING — sign waits until
    # desktop finishes so the staged portable .exe artifact is available
    # to glob over. But desktop failing must NOT cause sign to be
    # skipped: with signing enabled the release page's pubkey-baked
    # updater (see src/update_apply.rs::verify_minisig) refuses any
    # downloaded asset without a matching `.minisig`, so a "sign got
    # skipped because desktop failed" path would publish CLI+APK with
    # the right pubkey but no signatures and break every existing
    # client's auto-update flow.
    #
    # The `always()` plus explicit success checks for build/android
    # decouple sign's RUN decision from desktop's RESULT: sign runs as
    # long as build+android succeed and signing is enabled, regardless
    # of desktop's outcome. The for-loop further down uses `[ -f "$f" ]`
    # so a missing portable .exe (because desktop failed) is silently
    # skipped — the CLI / APK signatures still get produced and the
    # release ships consistently-signed.
    needs: [build, android, desktop]
    if: |
      always()
      && vars.MINISIGN_SIGNING_ENABLED == 'true'
      && needs.build.result == 'success'
      && needs.android.result == 'success'
    runs-on: ubuntu-latest
    env:
      RSIGN2_VERSION: 0.6.5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # Cache the pinned `cargo install rsign2` output so we're not
      # rebuilding it from scratch every release. The key includes the
      # rsign2 version so tool upgrades invalidate the cache deliberately.
      - uses: Swatinem/rust-cache@v2
        with:
          key: rsign2-${{ env.RSIGN2_VERSION }}-stable
          cache-bin: "false"

      - name: Install rsign2
        run: |
          # `--version` pins the signing tool itself; `--locked` uses that
          # crate release's Cargo.lock so transitive bumps are deliberate too.
          cargo install --quiet --locked --version "${RSIGN2_VERSION}" rsign2

      # Pull only the artifacts we actually need to sign. Filtering on
      # `rahgozar-*` skips the buildkit attestation artifact that
      # docker/build-push-action@v6 uploads with a `dazzling-no-more~rahgozar~XXX.dockerbuild`
      # name — `gh run download` (the previous tool) tried to extract it
      # as a zip and failed, then left half-extracted files around that
      # blocked the retry with a "file exists" error.
      # `merge-multiple: true` flattens each artifact's subdir so the
      # signer loop below sees files directly under `dist/`.
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: rahgozar-*
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la dist/

      - name: Sign artifacts
        env:
          # Whole secret-key file content (multi-line — the `untrusted
          # comment` line plus the base64 key line). Pass it via env to
          # avoid quoting issues inside a heredoc.
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          # rsign2 reads the key passphrase from RSIGN_PASSWORD when set
          # (so we can sign non-interactively in CI). For passwordless
          # keys (generated with `rsign generate -p ... -s ... -W`), an
          # empty string here is correct.
          RSIGN_PASSWORD: ${{ secrets.MINISIGN_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${RAHGOZAR_UPDATE_PUBKEY:-}" ]; then
            echo "::error::MINISIGN_SIGNING_ENABLED is true but MINISIGN_PUBLIC_KEY repo variable is empty"
            exit 1
          fi
          if [ -z "${MINISIGN_SECRET_KEY:-}" ]; then
            echo "::error::MINISIGN_SIGNING_ENABLED is true but MINISIGN_SECRET_KEY secret is empty"
            exit 1
          fi
          # Write the key to a temp file. Use a strict umask so a stray
          # `set -x` later doesn't expose it to other steps' logs (the
          # file path is fine; the contents aren't).
          umask 077
          KEY_FILE="$(mktemp -t rahgozar-sign-XXXXXX.key)"
          # `printf` rather than `echo`: preserves the secret body without
          # shell-specific escapes, while ensuring the file ends with a
          # newline for tools that expect line-oriented minisign keys.
          #
          # `tr -d '\r'` strips any CR characters carried over from the
          # secret being uploaded from a Windows host (MINGW64's `<` redirect
          # preserves CRLF bytes; `gh secret set` stores them verbatim). On a
          # Linux CI runner those CRs end up inside the base64 payload of the
          # secret-key file, garbling the ciphertext — rsign then fails
          # decryption with the misleading "Wrong password for that key"
          # because libsodium's crypto_secretbox_open can't tell ciphertext
          # corruption from a key mismatch.
          printf '%s\n' "${MINISIGN_SECRET_KEY}" | tr -d '\r' > "${KEY_FILE}"

          # Diagnostic fingerprint — visible in the run log only as a sha256
          # of the on-disk key file, so we can compare against `sha256sum
          # rahgozar-update.key` (after `tr -d '\r'`) on the maintainer's
          # box if signing fails. Reveals nothing about the key contents.
          echo "key file fingerprint: $(sha256sum "${KEY_FILE}" | cut -d' ' -f1)"
          echo "key file size: $(stat -c %s "${KEY_FILE}") bytes"

          # Trap to wipe the key on any exit (success, failure, signal).
          trap 'rm -f "${KEY_FILE}"' EXIT

          shopt -s nullglob
          signed=0
          # Globs cover every artifact that ships outside the Tauri bundle
          # signing chain. `dist/portable/rahgozar-portable-*.exe` is the
          # Windows portable .exe — it lives nested under `portable/` because
          # upload-artifact preserves the subdir layout under
          # `target/release/bundle/`. The MSI/NSIS installers already get
          # their own `.sig` from `tauri build`'s updater signing and stay
          # out of this glob deliberately, since mixing two signature
          # schemes on the same artifact only confuses downstream
          # verifiers. The portable .exe doesn't get the Tauri sig (it's
          # the unpackaged binary, not a bundle output), which is why it
          # specifically needs to be picked up here.
          for f in dist/*.tar.gz dist/*.zip dist/*.apk \
                   dist/rahgozar-drive-relay-linux-x86_64 \
                   dist/rahgozar-drive-relay-linux-aarch64 \
                   dist/portable/rahgozar-portable-*.exe; do
            [ -f "$f" ] || continue
            echo "::group::sign $(basename "$f")"
            # `-W` = "this key is NOT password-protected, skip decryption."
            # The matching expectation is that the keypair was generated
            # with `rsign generate -W` (creates an unencrypted secret-key
            # file). For CI-only signing where the key file and any
            # passphrase would both live in the same GitHub Secrets store,
            # the passphrase adds no real security — anyone who can read
            # MINISIGN_SECRET_KEY can also read MINISIGN_KEY_PASSWORD —
            # so we just use an unencrypted key and let `-W` skip the
            # password machinery entirely. Without `-W`, rsign2 tries to
            # prompt via /dev/tty and fails with ENXIO in CI.
            # `-x <out>` = write the signature to a specific path so it
            # lands as `<asset>.minisig` instead of rsign's default
            # next-to-binary location.
            rsign sign \
              -W \
              -s "${KEY_FILE}" \
              -x "${f}.minisig" \
              "$f"
            ls -la "${f}.minisig"
            echo "::endgroup::"
            signed=$((signed + 1))
          done
          echo "signed ${signed} artifacts"
          if [ "${signed}" -eq 0 ]; then
            echo "::warning::no artifacts matched dist/*.{tar.gz,zip,apk}, dist/rahgozar-drive-relay-linux-{x86_64,aarch64}, or dist/portable/rahgozar-portable-*.exe"
          fi

          # Hard assertion: every staged portable .exe MUST have a
          # matching .minisig at this point. The for-loop above tolerates
          # missing files (`[ -f "$f" ] || continue`) — the right behavior
          # for the optional CLI / APK globs, since a tag-only build that
          # ran android-only or a partial matrix would otherwise fail
          # signing for the absent legs. But for the portable .exe we
          # need a stronger guarantee: any portable binary that DID make
          # it into dist/ must be signed before publish. Without this,
          # a future regression that breaks `rsign sign` only for the
          # portable case (e.g. weird .exe header bytes tripping rsign2,
          # or a path-quoting bug) would silently ship an unsigned
          # downloadable binary — re-introducing the same audit-trail
          # gap the `always()` fix in `sign:if` closed at the job level.
          # Fail loud here so the release page never shows an unsigned
          # `rahgozar-portable-*.exe`.
          shopt -s nullglob
          unsigned_portable=()
          for exe in dist/portable/rahgozar-portable-*.exe; do
            [ -f "$exe" ] || continue
            if [ ! -f "${exe}.minisig" ]; then
              unsigned_portable+=( "$exe" )
            fi
          done
          if [ "${#unsigned_portable[@]}" -gt 0 ]; then
            printf '::error::portable .exe missing minisig: %s\n' \
              "${unsigned_portable[@]}"
            exit 1
          fi

          unsigned_drive_relay=()
          for bin in dist/rahgozar-drive-relay-linux-x86_64 \
                     dist/rahgozar-drive-relay-linux-aarch64; do
            [ -f "$bin" ] || continue
            if [ ! -f "${bin}.minisig" ]; then
              unsigned_drive_relay+=( "$bin" )
            fi
          done
          if [ "${#unsigned_drive_relay[@]}" -gt 0 ]; then
            printf '::error::Drive relay binary missing minisig: %s\n' \
              "${unsigned_drive_relay[@]}"
            exit 1
          fi

      - name: Upload signatures
        uses: actions/upload-artifact@v4
        with:
          name: minisign-signatures
          # `**` catches the portable .exe's signature nested under
          # `dist/portable/` alongside the flat `dist/*.minisig` from
          # CLI / APK signing.
          path: dist/**/*.minisig
          if-no-files-found: error

  # Build + publish the tunnel-node Docker image to GHCR. Issue: every
  # full-mode user has to set up tunnel-node on a VPS, and "rustup +
  # cargo build --release" on a 1GB VPS is non-trivial — fails on memory,
  # takes 8+ minutes if it works, blocks anyone without Rust experience.
  # A prebuilt multi-arch image makes deployment a one-liner:
  #   docker run -d -p 8080:8080 -e TUNNEL_AUTH_KEY=... \
  #     ghcr.io/dazzling-no-more/rahgozar-tunnel-node:latest
  #
  # Tags published per release:
  #   v1.5.0       — exact version pin
  #   1.5          — auto-following minor
  #   latest       — most recent release (skipped on workflow_dispatch
  #                  re-publishes; see `latest` condition below)
  #
  # Build platforms: linux/amd64 and linux/arm64. Most VPS providers
  # (DigitalOcean, Hetzner, Oracle Free Tier) offer arm64 instances at
  # half price, and the binary works on both.
  #
  # Layout: `tunnel-docker-build` runs a 2-entry matrix, one per platform,
  # each on its own *native* runner — no QEMU. The amd64 leg uses the
  # standard `ubuntu-latest`; the arm64 leg uses `ubuntu-24.04-arm` (free
  # GitHub-hosted arm64 runner for public repos). Each leg pushes a
  # digest-only image to GHCR. `tunnel-docker-manifest` then stitches the
  # per-platform digests into a single multi-arch manifest under the
  # release tags. Result: arm64 build drops from ~20 min under QEMU
  # emulation to ~3–5 min native, cutting the tunnel-docker critical
  # path of the release roughly in half.
  #
  # The Dockerfile is unchanged — any developer running
  # `docker build ./tunnel-node` (single-arch native) or
  # `docker buildx build --platform=linux/amd64,linux/arm64 ./tunnel-node`
  # (multi-arch via local QEMU) locally still works identically. We just
  # don't emulate in CI anymore.
  tunnel-docker-build:
    # No `needs:` on purpose. tunnel-node is a separate crate; the docker
    # image is built from ./tunnel-node source via its own Dockerfile and
    # consumes zero artifacts from the desktop build matrix. Previously
    # this job had `needs: build`, which idled it for ~14 min (until the
    # slowest matrix job — windows-amd64 cold — finished) before docker
    # buildx could even start, lengthening every release by ~10 min for
    # no real dependency reason.
    #
    # The `release` job still has `needs: [build, android, sign]`, so a
    # failed build matrix still blocks the GitHub Releases page from
    # being created. The only thing this change decouples is whether the
    # `ghcr.io/.../rahgozar-tunnel-node:v<ver>` tag can advance when the
    # desktop binaries fail to build. Acceptable: tunnel-node consumers
    # (VPS operators running `docker run ghcr.io/.../rahgozar-tunnel-node`)
    # are a different audience from desktop users, and the recovery path
    # (workflow_dispatch on the existing tag to retry the failed pieces)
    # republishes the docker tag atomically with the rest.
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runs-on: ubuntu-latest
            arch_suffix: amd64
          - platform: linux/arm64
            # GitHub-hosted free arm64 runner for public repos (GA early
            # 2025). Native arm64 means no QEMU and no 5–10x emulation
            # tax on Rust compilation. If GitHub retires this label,
            # swap for the latest `ubuntu-XX.YY-arm` they publish.
            runs-on: ubuntu-24.04-arm
            arch_suffix: arm64
    runs-on: ${{ matrix.runs-on }}
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.ver.outputs.version }}
      minor: ${{ steps.ver.outputs.minor }}
    steps:
      - uses: actions/checkout@v4

      # Compute the version string the same way the rest of the workflow
      # does: tag pushes get it from github.ref_name (e.g. "v1.5.0"),
      # workflow_dispatch from the explicit `inputs.version` (e.g.
      # "1.5.0"). Strip a possible leading "v" so the docker tag namespace
      # is consistent: `:1.5.0`, not `:v1.5.0`.
      #
      # Both matrix legs compute the same value; the manifest job reads
      # it via `needs.tunnel-docker-build.outputs.version` — matrix
      # outputs collapse to a single value when every leg writes the same
      # thing, which is exactly the case here.
      - name: Compute version
        id: ver
        run: |
          VER="${{ inputs.version || github.ref_name }}"
          VER="${VER#v}"
          MINOR="${VER%.*}"
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "minor=${MINOR}" >> "$GITHUB_OUTPUT"
          echo "Building docker for v${VER} (minor: ${MINOR}) on ${{ matrix.platform }}"

      # No `docker/setup-qemu-action@v3` — we're building each platform
      # on its own native runner, so emulation is dead weight.
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build for a single platform and push by digest only — no tag is
      # applied here. The manifest job below combines the per-platform
      # digests under the actual release tags. This is the standard
      # docker/build-push-action multi-platform pattern for split runners.
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./tunnel-node
          file: ./tunnel-node/Dockerfile
          platforms: ${{ matrix.platform }}
          # Per-platform cache scope so the two matrix legs don't fight
          # over a shared GHA cache key (cache mode=max would otherwise
          # invalidate cross-platform layers on every push).
          cache-from: type=gha,scope=tunnel-${{ matrix.arch_suffix }}
          cache-to: type=gha,scope=tunnel-${{ matrix.arch_suffix }},mode=max
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/rahgozar-tunnel-node,push-by-digest=true,name-canonical=true,push=true

      # Write the digest to a file whose basename IS the digest (sans
      # `sha256:` prefix). The manifest job globs `/tmp/digests/*` and
      # reconstructs the `<image>@sha256:<digest>` reference list from
      # the filenames.
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          DIGEST="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${DIGEST#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: tunnel-docker-digest-${{ matrix.arch_suffix }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Combine the per-platform digests into a single multi-arch manifest
  # under the release tags. End-user `docker pull ...:<version>` (no
  # leading `v` — the workflow strips it, so the tag is e.g. `:2.2.0`,
  # not `:v2.2.0`) on either amd64 or arm64 keeps working unchanged —
  # the manifest list resolves to the right platform automatically.
  # `:latest` only moves on actual tag pushes; workflow_dispatch re-runs
  # on an existing version skip it.
  tunnel-docker-manifest:
    needs: tunnel-docker-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # Download each expected platform digest by *exact artifact name*,
      # not by glob. If a build leg silently produced no artifact (e.g.
      # `Export digest` regression, future maintainer renames the upload
      # without updating this list), the named download fails with
      # "Unable to find any artifacts for the associated workflow" and
      # this job aborts before `imagetools create` can publish a
      # single-platform manifest under the release tag. Adding a third
      # platform to `tunnel-docker-build` requires adding another
      # download here AND another expected entry in the assertion
      # script below — both must agree.
      - name: Download amd64 digest
        uses: actions/download-artifact@v4
        with:
          name: tunnel-docker-digest-amd64
          path: /tmp/digests
      - name: Download arm64 digest
        uses: actions/download-artifact@v4
        with:
          name: tunnel-docker-digest-arm64
          path: /tmp/digests

      # Belt-and-suspenders count check. Catches the case where someone
      # adds a new platform to `tunnel-docker-build` (and a matching
      # `Download <arch> digest` step above) without updating this
      # constant — the inspect-time platform assertion below covers the
      # opposite direction, but the count check makes the "extra
      # platform built but ignored" case fail loudly here too.
      - name: Verify expected digest count
        env:
          EXPECTED_COUNT: "2"
        run: |
          set -euo pipefail
          GOT=$(find /tmp/digests -maxdepth 1 -type f | wc -l)
          if [ "${GOT}" -ne "${EXPECTED_COUNT}" ]; then
            echo "::error::expected ${EXPECTED_COUNT} platform digests, got ${GOT}"
            ls -la /tmp/digests/
            exit 1
          fi
          echo "verified ${GOT} platform digest(s) present"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        env:
          VERSION: ${{ needs.tunnel-docker-build.outputs.version }}
          MINOR: ${{ needs.tunnel-docker-build.outputs.minor }}
          EVENT: ${{ github.event_name }}
          IMG: ghcr.io/${{ github.repository_owner }}/rahgozar-tunnel-node
        run: |
          set -euo pipefail
          TAGS=( "-t" "${IMG}:${VERSION}" "-t" "${IMG}:${MINOR}" )
          # `:latest` only on tag-push events. workflow_dispatch reruns
          # on an already-released version (e.g. mipsel republish) must
          # not move the latest pointer — matches the previous behavior.
          if [ "${EVENT}" = "push" ]; then
            TAGS+=( "-t" "${IMG}:latest" )
          fi
          SOURCES=()
          for f in /tmp/digests/*; do
            DIGEST="$(basename "$f")"
            SOURCES+=( "${IMG}@sha256:${DIGEST}" )
          done
          docker buildx imagetools create "${TAGS[@]}" "${SOURCES[@]}"

      # Assert the *published* manifest actually contains every expected
      # platform. Catches:
      #  - registry write that succeeded but landed a partial manifest
      #    for any reason (extremely unlikely with `imagetools create`,
      #    but cheap to verify)
      #  - silent regressions where a future Dockerfile change makes one
      #    platform's build push a manifest list that imagetools then
      #    flattens in unexpected ways
      # `--raw` returns the manifest JSON; jq diffs against the expected
      # platform set and exits non-zero (via `error`) if anything's
      # missing. Update EXPECTED_PLATFORMS when the build matrix grows.
      - name: Inspect manifest and assert platforms
        env:
          VERSION: ${{ needs.tunnel-docker-build.outputs.version }}
          IMG: ghcr.io/${{ github.repository_owner }}/rahgozar-tunnel-node
          EXPECTED_PLATFORMS: '["linux/amd64","linux/arm64"]'
        run: |
          set -euo pipefail
          docker buildx imagetools inspect "${IMG}:${VERSION}"
          docker buildx imagetools inspect --raw "${IMG}:${VERSION}" \
            | jq --argjson expected "${EXPECTED_PLATFORMS}" -er '
                ([.manifests[]
                  | select((.platform.os != "unknown") and
                           (.platform.architecture != "unknown"))
                  | "\(.platform.os)/\(.platform.architecture)"] | unique) as $got
                | ($expected | unique) as $want
                | ($want - $got) as $missing
                | ($got - $want) as $unexpected
                | if ($missing | length) > 0 then
                    error("manifest missing platforms: " + ($missing | tostring) +
                          "; got: " + ($got | tostring))
                  elif ($unexpected | length) > 0 then
                    error("manifest has unexpected platforms: " +
                          ($unexpected | tostring) + "; got: " + ($got | tostring))
                  else
                    "manifest contains exactly the expected platforms: " +
                    ($got | tostring)
                  end
              '

  # release: lightweight aggregation job kept on GH-hosted ubuntu-latest.
  # It only downloads artifacts and calls APIs — no build tooling needed,
  # no benefit from moving to self-hosted, and keeping it off the
  # self-hosted runners avoids contention with Linux build jobs from
  # the next tag if two releases overlap.
  release:
    needs: [build, desktop, desktop-manifest, android, sign]
    # When `sign` is skipped (signing not yet enabled in repo vars) we
    # still want the release to proceed with unsigned artifacts. GH
    # Actions' default behaviour skips dependent jobs whenever ANY needed
    # job is skipped — this `if:` overrides that so a skipped `sign`
    # doesn't block release, but a `sign` *failure* still does. Same
    # treatment for `desktop` / `desktop-manifest`: if the Tauri build
    # fails on a platform (e.g. missing macOS notarisation env), the
    # CLI + APK release still ships.
    if: |
      always()
      && needs.build.result == 'success'
      && needs.android.result == 'success'
      && (needs.sign.result == 'success' || needs.sign.result == 'skipped')
      && (needs.desktop.result == 'success' || needs.desktop.result == 'skipped' || needs.desktop.result == 'failure')
      && (needs.desktop-manifest.result == 'success' || needs.desktop-manifest.result == 'skipped' || needs.desktop-manifest.result == 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Pull every artifact that should land on the Release page. Filter
      # to `rahgozar-*` and `minisign-*` so we skip the docker buildkit
      # attestation artifact (`dazzling-no-more~rahgozar~XXX.dockerbuild`)
      # — `gh run download` tried to extract it as zip and failed, then
      # left half-extracted files around that blocked the retry with a
      # "file exists" error. Identical fix to the sign job's earlier patch.
      # `merge-multiple: true` flattens each artifact's subdir so the
      # softprops uploader below sees files directly under `dist/`.
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: '{rahgozar-*,minisign-signatures}'
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la dist/

      # Compose the GitHub Release body. Three sections, top to bottom:
      #   1. ## Install         — quick-pick install lines per platform
      #   2. (bilingual changelog from docs/changelog/v<ver>.md)
      #   3. ## Download        — flat table of every binary asset
      # Signatures + latest.json are uploaded but intentionally NOT listed
      # in the body (uv-style; they're verification artifacts and add
      # visual noise without giving users a useful choice).
      #
      # The composition itself lives in
      # `.github/scripts/compose_release_body.py` — kept out of the YAML
      # so a non-trivial Python script can be edited, linted, and dry-run
      # locally without round-tripping through CI. See its module docstring
      # for the asset-categorisation rules.
      #
      # `softprops/action-gh-release`'s `generate_release_notes: true`
      # appends GitHub's auto "What's Changed" + "Full Changelog: …"
      # block AFTER our composed body. We deliberately do NOT pass
      # `append_body: true` — that would stack our body on top of the
      # existing release body on every workflow_dispatch re-publish.
      - name: Compose release body
        id: relbody
        env:
          VERSION: ${{ inputs.version && format('{0}', inputs.version) || github.ref_name }}
          REPO_PATH: ${{ github.repository }}
        run: |
          set -euo pipefail
          VER="${VERSION#v}"
          CHANGELOG="docs/changelog/v${VER}.md"
          if [ ! -f "$CHANGELOG" ]; then
            echo "::warning::no changelog at $CHANGELOG; release body will fall back to generate_release_notes only"
            echo "has_changelog=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BODY=$(CHANGELOG_PATH="$CHANGELOG" VERSION="$VER" REPO_PATH="$REPO_PATH" \
                 python3 .github/scripts/compose_release_body.py)
          {
            echo 'body<<__RELEASE_BODY_EOF__'
            printf '%s\n' "$BODY"
            echo '__RELEASE_BODY_EOF__'
          } >> "$GITHUB_OUTPUT"
          echo "has_changelog=true" >> "$GITHUB_OUTPUT"

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          # On tag push, action-gh-release defaults tag_name to the
          # current ref. On workflow_dispatch the ref is `main` (or
          # whichever branch we dispatched from), which would create a
          # bogus release named "main"; force the tag explicitly so
          # artifacts upload to the existing release identified by
          # `inputs.version`. The leading `v` is preserved (release
          # tags are `v1.4.0`, not `1.4.0`).
          tag_name: ${{ inputs.version && format('v{0}', inputs.version) || github.ref_name }}
          # Recursive glob: Tauri desktop artifacts arrive nested under
          # `dist/deb/`, `dist/msi/`, `dist/dmg/`, `dist/macos/`,
          # `dist/appimage/`, etc. — the upload-artifact step preserves
          # the bundle/ subdir layout. A flat `dist/*` would only catch
          # the CLI / APK files at the top level and silently skip the
          # installers.
          files: dist/**/*
          # `generate_release_notes: true` with `body:` set produces
          # `<body><auto-notes>` as the final release body — body is
          # prepended, GitHub's auto "What's Changed / Full Changelog"
          # comparison link is appended. We deliberately do NOT pass
          # `append_body: true` here: it would append the combined
          # `<body><auto-notes>` to whatever body the release already
          # has, which for `workflow_dispatch` re-publishes on an
          # existing release duplicates everything (every dispatch
          # would balloon the body further). For fresh tag pushes the
          # existing body is empty, so replace (default) and append
          # are equivalent — replace is the safer of the two. Found
          # the hard way when the v2.7.0 release-body redesign was
          # tested via workflow_dispatch and rendered the old + new
          # body back-to-back.
          body: ${{ steps.relbody.outputs.body }}
          generate_release_notes: true

  # Refresh the in-repo `releases/` folder with the latest pre-built
  # artifacts so users behind GitHub-Releases-page filtering (the IR
  # state network filters the dynamic /releases/ URL but not the static
  # `Code → Download ZIP` of the source tree) can still download.
  # Practice was started pre-v1.1.0, dropped, then resumed at user
  # request after a Telegram-channel suggestion: "فقط داخل پوشه ریلیز
  # پروژه اپلود بکن — مشکل دانلود حل میشه — راحت میشه از گیتهاب دانلود
  # کرد." The folder holds ONLY the latest version (replace, not
  # archive); each tag refresh overwrites the previous artifacts. The
  # existing release-page workflow keeps versioned artifacts behind
  # `https://github.com/.../releases/tag/v...` for users who can reach
  # that URL — this in-repo folder is the fallback for users who can't.
  commit-releases:
    needs: [build, android, sign, release]
    # Same skipped-sign escape hatch as the `release` job: `always()` keeps
    # this job evaluable when `sign` is skipped, while the explicit success
    # checks still block cancellations/failures from build/android/release.
    if: |
      always()
      && needs.build.result == 'success'
      && needs.android.result == 'success'
      && needs.release.result == 'success'
      && (needs.sign.result == 'success' || needs.sign.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Always check out main, not the tag — we're committing back to
      # the moving branch. fetch-depth 0 so `git push origin HEAD:main`
      # has the lineage to fast-forward.
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # Pull artifacts from the GitHub Release page (which the `release`
      # job populated a few seconds earlier) rather than the workflow
      # artifacts API. The artifacts API path —
      # `actions/download-artifact@v4` with `merge-multiple: true` —
      # has been failing with "artifact download failed after 5
      # retries" on one of the ~13 artifacts on multiple consecutive
      # runs (v1.7.5 retrigger, v1.7.6). The 10 fast downloads that
      # complete first all succeed; the 11th-13th hit the error.
      # `gh release download` reads from GitHub's Release-page CDN,
      # which is independent of the artifacts blob store and has a
      # different retry / rate-limit profile. Same files, more
      # reliable surface.
      - name: Download artifacts from the GitHub Release page
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VER="${{ inputs.version || github.ref_name }}"
          # Strip leading `v` to normalize, then re-add — the Release
          # tag is `vX.Y.Z`, but for the rest of the workflow we use
          # bare `X.Y.Z`. Mirror the same pattern here so a downstream
          # readme update can use the bare version.
          VER="${VER#v}"
          mkdir -p artifacts
          gh release download "v${VER}" \
            --repo "${{ github.repository }}" \
            --dir artifacts \
            --pattern '*.tar.gz' \
            --pattern '*.zip' \
            --pattern '*.apk' \
            --pattern '*.minisig' \
            --pattern '*.msi' \
            --pattern '*.dmg' \
            --pattern '*.AppImage' \
            --pattern '*.deb' \
            --pattern 'rahgozar-portable-*.exe' \
            --pattern 'latest.json'
          echo "--- artifacts/ contents ---"
          ls -la artifacts/

      - name: Refresh releases/ folder
        run: |
          set -euo pipefail
          VER="${{ inputs.version || github.ref_name }}"
          VER="${VER#v}"

          mkdir -p releases

          # Wipe old binary artifacts but keep README.md and
          # .gitattributes — those are folder-level docs that stay
          # constant across versions and shouldn't be regenerated on
          # every release. Pattern now covers the Tauri desktop
          # installer formats added in v2.4 (.msi / .dmg / .AppImage /
          # .deb) plus the latest.json updater manifest.
          find releases -maxdepth 1 -type f \
            \( -name '*.apk' -o -name '*.tar.gz' -o -name '*.zip' \
               -o -name '*.minisig' -o -name '*.msi' -o -name '*.dmg' \
               -o -name '*.AppImage' -o -name '*.deb' \
               -o -name '*.exe' \
               -o -name 'rahgozar-drive-relay-linux-*' \
               -o -name 'latest.json' \) \
            -delete

          # Copy CLI archives (rahgozar-linux-amd64.tar.gz, etc.).
          # Version-stable filenames, no rename needed.
          for f in artifacts/*.tar.gz artifacts/*.zip; do
            [ -f "$f" ] || continue
            cp "$f" "releases/$(basename "$f")"
          done

          # Bare Drive relay binaries are used by the VPS install docs.
          for f in artifacts/rahgozar-drive-relay-linux-x86_64 \
                   artifacts/rahgozar-drive-relay-linux-aarch64; do
            [ -f "$f" ] || continue
            cp "$f" "releases/$(basename "$f")"
          done

          # Copy Tauri desktop installers. Same `rahgozar-desktop-*`
          # prefix the desktop matrix produces; one installer format
          # per platform. Users on GitHub-Releases-page-filtered ISPs
          # who hit the in-repo `releases/` fallback get the desktop
          # UI through this path. The portable Windows .exe is included
          # via the `rahgozar-portable-*.exe` glob — `gh release download`
          # already filters out the NSIS installer .exe at fetch time
          # so we don't have to disambiguate here.
          for f in artifacts/*.msi artifacts/*.dmg artifacts/*.AppImage artifacts/*.deb \
                   artifacts/rahgozar-portable-*.exe; do
            [ -f "$f" ] || continue
            cp "$f" "releases/$(basename "$f")"
          done

          # Updater manifest. `tauri-plugin-updater` clients point at
          # `releases/latest/download/latest.json` — copying it into
          # the in-repo fallback keeps the auto-update flow working
          # even when the release-page redirect is filtered.
          if [ -f artifacts/latest.json ]; then
            cp artifacts/latest.json releases/latest.json
          fi

          # Android APKs come with the version baked into the name
          # (rahgozar-android-universal-v1.7.5.apk). Copy all of them so
          # users on slow connections can grab a per-ABI APK (~37 MB)
          # instead of the universal (~110 MB).
          for f in artifacts/rahgozar-android-*.apk; do
            [ -f "$f" ] || continue
            cp "$f" "releases/$(basename "$f")"
          done

          # Minisign signatures, when present (signing is opt-in via the
          # MINISIGN_SIGNING_ENABLED repo variable). Naming follows the
          # `<asset>.minisig` convention the auto-updater expects, so a
          # user who hits the in-repo `releases/` fallback path
          # (GitHub-Releases-page filtered ISP) gets verified updates too.
          for f in artifacts/*.minisig; do
            [ -f "$f" ] || continue
            cp "$f" "releases/$(basename "$f")"
          done

          # Update the "Current version" line in releases/README.md
          # (both English and Persian copies) and APK filename refs so
          # the doc stays accurate. `sed -i` BSD/GNU compatibility is
          # handled by passing an empty extension explicitly — runner
          # is Linux so `-i` alone works, but the empty-string form
          # also works on macOS for anyone running this locally.
          if [ -f releases/README.md ]; then
            sed -i.bak \
              -e "s/Current version: \*\*v[0-9][0-9.]*\*\*/Current version: **v${VER}**/" \
              -e "s/نسخهٔ فعلی: \*\*v[0-9][0-9.]*\*\*/نسخهٔ فعلی: **v${VER}**/" \
              -e "s/rahgozar-android-universal-v[0-9][0-9.]*\.apk/rahgozar-android-universal-v${VER}.apk/g" \
              releases/README.md
            rm -f releases/README.md.bak
          fi

          echo "--- releases/ contents after refresh ---"
          ls -la releases/

      - name: Commit + push to main
        run: |
          set -euo pipefail
          VER="${{ inputs.version || github.ref_name }}"
          VER="${VER#v}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add releases
          if git diff --cached --quiet; then
            echo "No releases/ changes to commit (artifacts identical to current HEAD?)."
            exit 0
          fi

          git commit -m "chore(releases): refresh prebuilt binaries for v${VER}" \
                     -m "Auto-committed by release workflow so users behind GitHub-Releases-page filtering can download via the in-repo releases/ folder. The GitHub Release page itself still has the canonical versioned artifacts; this folder is the fallback path for users who can only reach the static source tree (Code → Download ZIP)."

          # Push to main. The release workflow runs on the tag commit,
          # which is reachable from main as a fast-forward — push is
          # straightforward, no force needed. Tag protection rules
          # apply to refs/tags/* not refs/heads/main, so this push
          # isn't gated by the same protection.
          git push origin HEAD:main
